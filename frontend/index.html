<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>DevOps Certification Exam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #f0f2f5, #e0e7ff);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 3px solid #6366f1;
            padding-bottom: 0.5rem;
            background: linear-gradient(to right, #6366f1, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: white;
            padding: 2rem 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
        }

        label {
            margin: 0.75rem 0 0.25rem;
            font-weight: 600;
            color: #374151;
            width: 100%;
        }

        input, select {
            margin-bottom: 1rem;
            padding: 0.75rem;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: box-shadow 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 5px #6366f1;
        }

        .next-btn {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .next-btn:hover {
            background-color: #4338ca;
            transform: scale(1.05);
        }

        .banner {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin-bottom: 2rem;
            border-radius: 1rem;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DevOps Certification Exam</h1>
        <img src="{{ url_for('static', filename='devops-banner.jpg') }}" class="banner" alt="DevOps Banner">
        
        <form action="/start" method="POST">
            <label>Name:</label>
            <input type="text" name="name" required><br>

            <label>Gender:</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select><br>

            <label>Email:</label>
            <input type="email" name="email" required><br>

            <button type="submit" class="next-btn">Next →</button>
        </form>
    </div>
</body>
</html>
