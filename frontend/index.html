<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Information Card</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #f0f2f5, #e0e7ff);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .heading {
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
      color: #333;
      border-bottom: 3px solid #6366f1;
      padding-bottom: 0.5rem;
      background: linear-gradient(to right, #6366f1, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background-color: white;
      padding: 2rem 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .info {
      font-size: 1.2rem;
      margin: 1rem 0;
      color: #1f2937;
    }

    .footer {
      text-align: center;
      padding: 1rem;
      font-size: 1rem;
      background-color: #f3f4f6;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="heading">User Information</div>
    <div class="card">
      <div class="info"><strong>Full Name:</strong> John Doe</div>
      <div class="info"><strong>Gender:</strong> Male</div>
      <div class="info"><strong>Email:</strong> johndoe@example.com</div>
    </div>
  </div>
  <div class="footer">Developed by Kastro</div>
</body>
</html>
