<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Mock Certification Exam</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #f0f2f5, #e0e7ff);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .heading {
      font-size: 2.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 2rem;
      border-bottom: 3px solid #6366f1;
      padding-bottom: 0.5rem;
      background: linear-gradient(to right, #6366f1, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    input, select {
      margin: 0.5rem 0;
      padding: 0.75rem;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      transition: box-shadow 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      box-shadow: 0 0 5px #6366f1;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.3s ease;
    }

    button:hover {
      background-color: #4338ca;
      transform: scale(1.05);
    }

    .card {
      background-color: white;
      padding: 2rem 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 100%;
      max-width: 400px;
      margin-top: 1rem;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease-in-out;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .info {
      font-size: 1.2rem;
      margin: 1rem 0;
      color: #1f2937;
    }

    .footer {
      text-align: center;
      padding: 1rem;
      font-size: 1rem;
      background-color: #f3f4f6;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="heading">DevOps Mock Certification Exam</div>
    <form id="userForm">
      <input type="text" id="name" placeholder="Full Name" required />
      <select id="gender" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
      <input type="email" id="email" placeholder="Email ID" required />
      <button type="submit">Register and Proceed</button>
    </form>

    <div id="output" class="card">
      <div class="info" id="displayName"></div>
      <div class="info" id="displayGender"></div>
      <div class="info" id="displayEmail"></div>
    </div>
  </div>

  <div class="footer">Developed by Kastro</div>

  <script>
    const form = document.getElementById('userForm');
    const output = document.getElementById('output');
    const nameDisplay = document.getElementById('displayName');
    const genderDisplay = document.getElementById('displayGender');
    const emailDisplay = document.getElementById('displayEmail');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const gender = document.getElementById('gender').value;
      const email = document.getElementById('email').value;

      nameDisplay.textContent = `Full Name: ${name}`;
      genderDisplay.textContent = `Gender: ${gender}`;
      emailDisplay.textContent = `Email: ${email}`;

      output.classList.add("show");

      // Delay before redirecting to the questions page
      setTimeout(() => {
        // Optional: Pass data via query params or sessionStorage if needed
        window.location.href = "questions.html";
      }, 2000); // 2 seconds to show the card briefly
    });
  </script>
</body>
</html>
